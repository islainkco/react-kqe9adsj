<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E6E2DA" />
    <meta name="description" content="Isla Ink — Tattoo Booking" />
    <title>Isla Ink · Book Your Appointment</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #CCC8C0; }
    </style>
  </head>
  <body>
    <!-- Hidden form for Netlify to detect -->
    <form name="isla-ink-booking" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="isla-ink-booking" />
      <input name="name" />
      <input name="contact_via" />
      <input name="contact" />
      <textarea name="tattoo_description"></textarea>
      <input name="reference_link" />
      <textarea name="reference_notes"></textarea>
      <input name="size" />
      <input name="placement" />
      <input name="placement_detail" />
      <input name="budget" />
      <input name="first_tattoo" />
      <textarea name="health_notes"></textarea>
      <input name="preferred_date" />
      <input name="preferred_time" />
      <input name="payment" />
    </form>

    <div id="root"></div>
  </body>
</html>
